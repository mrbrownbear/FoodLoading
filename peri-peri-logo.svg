<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Background -->
  <rect width="400" height="200" fill="#ffffff"/>
  
  <!-- Peri text (first) -->
  <text x="20" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FF8C42">Peri</text>
  
  <!-- Chicken icon -->
  <g transform="translate(160, 30)">
    <!-- Chicken body -->
    <ellipse cx="20" cy="35" rx="25" ry="20" fill="#8B4513" stroke="#654321" stroke-width="2"/>
    <!-- Chicken head -->
    <circle cx="20" cy="15" r="12" fill="#8B4513" stroke="#654321" stroke-width="2"/>
    <!-- Comb -->
    <path d="M15 8 L18 3 L21 8 L24 3 L27 8" fill="#DC143C" stroke="#B22222" stroke-width="1"/>
    <!-- Beak -->
    <polygon points="8,15 3,18 8,21" fill="#FFA500"/>
    <!-- Eye -->
    <circle cx="18" cy="12" r="2" fill="#000"/>
    <!-- Legs -->
    <line x1="10" y1="50" x2="8" y2="60" stroke="#FFA500" stroke-width="3"/>
    <line x1="30" y1="50" x2="32" y2="60" stroke="#FFA500" stroke-width="3"/>
    <!-- Feet -->
    <path d="M5 60 L2 65 M8 60 L11 65 M8 60 L5 65" stroke="#FFA500" stroke-width="2" fill="none"/>
    <path d="M29 60 L26 65 M32 60 L35 65 M32 60 L29 65" stroke="#FFA500" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Peri text (second) -->
  <text x="220" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FF8C42">Peri</text>
  
  <!-- Catering text -->
  <text x="50" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#DC143C">Catering</text>
  
  <!-- Decorative dots -->
  <circle cx="380" cy="40" r="8" fill="#FF8C42"/>
  <circle cx="350" cy="160" r="6" fill="#FF8C42"/>
</svg>